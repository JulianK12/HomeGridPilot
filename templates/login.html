<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeGridPilot – {{ t.login_title }}</title>
  <link href="{{ url_for('static', filename='fonts/inter.css') }}" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #f97316;
      --accent2:   #fb923c;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --success:   #3fb950;
      --danger:    #f85149;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 500px;
      background: radial-gradient(ellipse, rgba(249,115,22,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #fff;
    }

    .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    h1 { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s, transform .1s;
    }
    .btn-login:hover { opacity: .9; }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }

    .error-msg {
      background: rgba(248,81,73,0.12);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--danger);
      margin-top: 14px;
      display: none;
    }
    .error-msg.show { display: block; }

    .hint {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .hint code {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      color: var(--accent);
      font-size: 12px;
    }

    .lang-switch {
      position: absolute;
      top: 16px; right: 16px;
      display: flex; gap: 4px;
    }
    .lang-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 9px;
      font-size: 11px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background .12s, color .12s;
    }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="lang-switch">
      <button type="button" class="lang-btn {{ 'active' if lang == 'de' else '' }}" onclick="setLang('de')">DE</button>
      <button type="button" class="lang-btn {{ 'active' if lang == 'en' else '' }}" onclick="setLang('en')">EN</button>
    </div>

    <div class="logo">
      <div class="logo-icon">H</div>
      <div>
        <div class="logo-text">HomeGridPilot</div>
        <div class="logo-sub">{{ t.login_brand_sub }}</div>
      </div>
    </div>

    <h1>{{ t.login_welcome }}</h1>
    <p class="subtitle">{{ t.login_instructions }}</p>

    <div class="field">
      <label>{{ t.username }}</label>
      <input id="username" type="text" placeholder="{{ t.username }}" autocomplete="username" />
    </div>
    <div class="field">
      <label>{{ t.password }}</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">{{ t.login_button }}</button>
    <div class="error-msg" id="errorMsg"></div>

    <div class="hint">
      {{ t.default_credentials }}: <code>admin</code> / <code>admin123</code>
    </div>
  </div>

  <script>
    const I18N = {{ t | tojson }};

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    async function setLang(lang) {
      await fetch('/api/language', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lang })
      });
      window.location.reload();
    }

    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = I18N.login_button_loading;
      err.classList.remove('show');

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = '/';
      } else {
        err.textContent = data.error || I18N.login_failed;
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = I18N.login_button;
      }
    }
  </script>
</body>
</html>
